<html>

<head>
  <title>Calculadora Basica</title>
</head>

<body>
  <h1>Calculadora Basica</h1>
  <input id="num1" type="number" placeholder="Numero1">
  <input id="num2" type="number" placeholder="Numero2">
  <button onclick="adicao()">+</button>
  <button onclick="subtracao()">-</button>
  <button onclick="multiplicacao()">*</button>
  <button onclick="divisao()">/</button>
  <button onclick="porcentagem()">%</button>
  <hr>
  <button onclick="rodar_todos_os_testes()">Rodar todos os testes</button>
  <hr>
  <button onclick="mostrar_no_resultado(testar_adicao())">Testar +</button>
  <button onclick="mostrar_no_resultado(testar_subtracao())">Testar -</button>
  <button onclick="mostrar_no_resultado(testar_multiplicacao())">Testar *</button>
  <button onclick="mostrar_no_resultado(testar_divisao())">Testar /</button>
  <button onclick="mostrar_no_resultado(testar_porcentagem())">Testar %</button>
  <button onclick="mostrar_no_resultado(testar_campos_vazios())">Testar Campo Vazio</button>
  <button onclick="mostrar_no_resultado(testar_divisao_por_0())">Testar Divisao Por 0</button>
  <button onclick="mostrar_no_resultado(testar_input())">Testar Input</button>
  <button onclick="mostrar_no_resultado(testar_placeholder())">Testar Placeholder</button>
  
  <div id="resultado"></div>

  <script>

    function adicao() {
      if (camposnull()) return;
      const num1 = Number(document.getElementById("num1").value);
      const num2 = Number(document.getElementById("num2").value);
      let resultado = (num1 + num2);
      document.getElementById("resultado").innerHTML = "Resultado = " + resultado;
    }


    function subtracao() {
      if (camposnull()) return;
      const num1 = Number(document.getElementById("num1").value);
      const num2 = Number(document.getElementById("num2").value);
      let resultado = (num1 - num2);
      document.getElementById("resultado").innerHTML = "Resultado = " + resultado;
    }


    function multiplicacao() {
      if (camposnull()) return;
      const num1 = Number(document.getElementById("num1").value);
      const num2 = Number(document.getElementById("num2").value);
      let resultado = (num1 * num2);
      document.getElementById("resultado").innerHTML = "Resultado = " + resultado;
    }


    function divisao() {
      if (camposnull()) return;
      const num1 = Number(document.getElementById("num1").value);
      const num2 = Number(document.getElementById("num2").value);
      if (num2 === 0) {
        document.getElementById("resultado").innerHTML = "Erro: Divisão por zero";
        return;
      }
      
      let resultado = (num1 / num2);
      document.getElementById("resultado").innerHTML = "Resultado = " + resultado;
    }

    function porcentagem() {
      if (camposnull()) return;
      const num1 = Number(document.getElementById("num1").value);
      const num2 = Number(document.getElementById("num2").value);
      let resultado = (num1 * (num2 / 100));
      document.getElementById("resultado").innerHTML = "Resultado = " + resultado;
    }

    function testar_adicao() {
      document.getElementById("num1").value = "2";
      document.getElementById("num2").value = "2";
      adicao();
      const resultadohtml = (document.getElementById("resultado").innerHTML)
      if (resultadohtml === "Resultado = 4") {
        return "<li> 2+2=4, Teste aprovado</li>";
      } else {
        return "<li> Teste não aprovado, resultado esperado = 4, resultado obtido = " + resultadohtml + "</li>";
      }
    }


    function testar_subtracao() {
      document.getElementById("num1").value = "2";
      document.getElementById("num2").value = "2";
      subtracao();
      const resultadohtml = (document.getElementById("resultado").innerHTML)
      if (resultadohtml === "Resultado = 0") {
        return "<li> 2-2=0, Teste aprovado</li>";
      } else {
        return "<li> Teste não aprovado, resultado esperado = 0, resultado obtido = " + resultadohtml + "</li>";
      }
    }


    function testar_multiplicacao() {
      document.getElementById("num1").value = "2";
      document.getElementById("num2").value = "2";
      multiplicacao();
      const resultadohtml = (document.getElementById("resultado").innerHTML)
      if (resultadohtml === "Resultado = 4") {
        return "<li> 2*2=4, Teste aprovado</li>";
      } else {
        return "<li> Teste não aprovado, resultado esperado = 4, resultado obtido = " + resultadohtml + "</li>";
      }
    }


    function testar_divisao() {
      document.getElementById("num1").value = "2";
      document.getElementById("num2").value = "2";
      divisao();
      const resultadohtml = (document.getElementById("resultado").innerHTML)
      if (resultadohtml === "Resultado = 1") {
        return "<li> 2/2=1, Teste aprovado</li>";
      } else {
        return "<li> Teste não aprovado, resultado esperado = 1, resultado obtido = " + resultadohtml + "</li>";
      }
    }

    function testar_porcentagem() {
      document.getElementById("num1").value = "10";
      document.getElementById("num2").value = "50";
      porcentagem();
      const resultadohtml = (document.getElementById("resultado").innerHTML)
      if (resultadohtml === "Resultado = 5") {
        return "<li> 50% de 10 = 5, Teste aprovado</li>";
      } else {
        return "<li> Teste não aprovado, resultado esperado = 5, resultado obtido = " + resultadohtml + "</li>";
      }
    }

    function testar_campos_vazios() {
      document.getElementById("num1").value = "";
      document.getElementById("num2").value = "2";
      adicao();
      const resultadohtml = (document.getElementById("resultado").innerHTML)
      if (resultadohtml === "Todos os campos devem ser preenchidos") {
        return "<li> Teste (campo vazio) aprovado</li>";
      } else {
        return "<li> Teste (campo vazio) não aprovado</li>";
      }
    }

    function testar_divisao_por_0() {
      document.getElementById("num1").value = "2";
      document.getElementById("num2").value = "0";
      divisao();
      const resultadohtml = (document.getElementById("resultado").innerHTML)
      if (resultadohtml === "Erro: Divisão por zero") {
        return "<li> Teste (divisao por 0) aprovado</li>";
      } else {
        return "<li> Teste (divisao por 0) não aprovado</li>";
      }
    }

    function testar_input() {
      const meuinput = document.getElementById("num1");
      const meuinput2 = document.getElementById("num2");
      if (meuinput !== null && meuinput2 !== null) {
        return "<li> Teste (input) aprovado</li>";
      } else {
        return "<li> Teste (input) não aprovado</li>";
      }
    }

    function testar_placeholder() {
      const input1 = document.getElementById("num1");
      const input2 = document.getElementById("num2");
      if (input1.placeholder == "Numero1" && input2.placeholder == "Numero2") {
        return "<li> Teste (placeholder) aprovado</li>";
      } else {
        return "<li> Teste (placeholder) não aprovado</li>";
      }
    }

    function camposnull() {
      const val1 = document.getElementById("num1").value;
      const val2 = document.getElementById("num2").value;
      if (val1 === "" || val2 === "") {
        document.getElementById("resultado").innerHTML = "Todos os campos devem ser preenchidos";
        return true;
      }
      return false;
    }

    function mostrar_no_resultado(texto_do_teste) {
  
      document.getElementById("resultado").innerHTML = texto_do_teste.replace(/<\/?li>/g, "");
    }

    function rodar_todos_os_testes() {
      let acumulador_de_resultados = "<h3>Resultado dos Testes:</h3><ul>";
      
      acumulador_de_resultados += testar_adicao();
      acumulador_de_resultados += testar_subtracao();
      acumulador_de_resultados += testar_multiplicacao();
      acumulador_de_resultados += testar_divisao();
      acumulador_de_resultados += testar_porcentagem();
      acumulador_de_resultados += testar_campos_vazios();
      acumulador_de_resultados += testar_divisao_por_0();
      acumulador_de_resultados += testar_input();
      acumulador_de_resultados += testar_placeholder();
      
      acumulador_de_resultados += "</ul>";
      
      document.getElementById("resultado").innerHTML = acumulador_de_resultados;
    }

  </script>
  <p>Calculadora para operaçoes basicas e porcentagem </p>
</body>

</html>
